<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bloom Studio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/bouquet.css">
  <link rel="stylesheet" href="css/flowers.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<header class="header">
  <h1><span>Bloom</span> Studio</h1>
  <p>Virtual Bouquet Maker</p>
</header>

<main class="layout">

  <!-- CONTROL PANEL -->
  <aside class="sidebar">

    <div class="panel">
      <h3>Choose Flowers</h3>

      <div class="flower-grid">

        <button class="flower-btn" onclick="addFlower('sunflower')">
          🌻
          <span>Sunflower</span>
        </button>

        <button class="flower-btn" onclick="addFlower('tulip')">
          🌷
          <span>Tulip</span>
        </button>

        <button class="flower-btn" onclick="addFlower('daisy')">
          🌼
          <span>Daisy</span>
        </button>

        <button class="flower-btn" onclick="addFlower('leaf')">
          🍃
          <span>Leaf</span>
        </button>

      </div>
    </div>

    <div class="panel">
      <h3>Gift Note</h3>

      <textarea
        id="giftNote"
        placeholder="Write your message..."
      ></textarea>
    </div>

    <div class="actions">
      <button class="clear-btn" onclick="resetBouquet()">
        Clear
      </button>

      <button class="gift-btn" onclick="wrapBouquet()">
        Wrap Bouquet
      </button>
    </div>

  </aside>

  <!-- BOUQUET PREVIEW -->
  <section class="preview">

    <div class="bouquet-scene">

      <div class="bouquet-glow"></div>

      <div class="wrapper-back"></div>

      <div id="bouquetCanvas" class="bouquet-canvas"></div>

      <div class="wrapper-front"></div>

      <div class="ribbon"></div>

    </div>

  </section>

</main>

<script src="js/flowers.js"></script>
<script src="js/bouquet.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
