<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual Flower Bouquet</title>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="app-shell">

    <!-- UI PANEL -->
    <section class="control-panel">

      <h1>Virtual Bouquet</h1>
      <p class="subtitle">
        Design a handcrafted digital flower arrangement
      </p>

      <div class="flower-toolbar">

        <button class="flower-btn sunflower-btn"
          data-flower="sunflower">
          Sunflower
        </button>

        <button class="flower-btn tulip-btn"
          data-flower="tulip">
          Tulip
        </button>

        <button class="flower-btn daisy-btn"
          data-flower="daisy">
          Daisy
        </button>

      </div>

      <textarea
        id="noteInput"
        placeholder="Write a heartfelt note..."
      ></textarea>

      <div class="actions">

        <button id="giftBtn" class="primary-btn">
          Gift It
        </button>

        <button id="resetBtn" class="secondary-btn">
          Reset
        </button>

      </div>

      <div class="limit-label">
        Maximum flowers: 15
      </div>

    </section>

    <!-- BOUQUET SECTION -->
    <section class="bouquet-stage">

      <div class="bouquet-card">

        <!-- LAYER 1 -->
        <div class="card-bg"></div>

        <!-- LAYER 2 -->
        <div class="wrapper-back"></div>

        <!-- LAYER 3 -->
        <div class="bouquet-canvas" id="bouquetCanvas"></div>

        <!-- LAYER 4 -->
        <div class="wrapper-front"></div>

      </div>

    </section>

  </div>

  <!-- FINAL GIFT CARD -->
  <div class="gift-overlay hidden" id="giftOverlay">

    <div class="gift-card">

      <div class="gift-bouquet">
        <div class="bouquet-card final-copy">
          <div class="card-bg"></div>
          <div class="wrapper-back"></div>
          <div class="bouquet-canvas" id="finalCanvas"></div>
          <div class="wrapper-front"></div>
        </div>
      </div>

      <div class="gift-note">

        <h2>For You 💐</h2>

        <p id="finalNote">
          Handmade with love.
        </p>

        <button id="closeGift">
          Create Another
        </button>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
