<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Virtual Letter 💌</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>💌 A Simple Letter</h1>

  <button onclick="openLetter()">Open Letter</button>

  <div id="letter" class="letter hidden">
    <h2>Dear You,</h2>
    <p>
      I just wanted to say thank you for being part of my life.
      You mean more than you know.
    </p>
    <p>
      I hope you are always happy and doing well.
    </p>
    <p class="end">— From me 💖</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
