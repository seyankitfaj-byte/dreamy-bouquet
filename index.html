<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual Flower Bouquet</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="background-glow"></div>

  <div class="app">

    <!-- LEFT PANEL -->
    <aside class="flower-panel" id="flowerPanel">

      <h1>🌸 Virtual Bouquet</h1>
      <p>Create your own flower arrangement</p>

      <div class="flower-options">

        <button class="flower-btn rose" data-flower="rose">
          🌹 Rose
        </button>

        <button class="flower-btn tulip" data-flower="tulip">
          🌷 Tulip
        </button>

        <button class="flower-btn daisy" data-flower="daisy">
          🌼 Daisy
        </button>

        <button class="flower-btn sunflower" data-flower="sunflower">
          🌻 Sunflower
        </button>

        <button class="flower-btn leaf" data-flower="leaf">
          🍃 Leaf
        </button>

      </div>

      <div class="message-box">

        <textarea
          id="giftMessage"
          placeholder="Write your gift message here..."
        ></textarea>

      </div>

      <div class="controls">

        <button id="wrapBtn" class="primary-btn">
          Wrap Bouquet
        </button>

        <button id="resetBtn" class="secondary-btn">
          Reset
        </button>

      </div>

      <p class="limit-text">
        Maximum bouquet size: 20 flowers
      </p>

    </aside>

    <!-- MAIN -->
    <main class="bouquet-area">

      <div class="bouquet-wrapper">

        <div class="bouquet" id="bouquet">

          <!-- FLOWERS GENERATED HERE -->

          <div class="vase"></div>
          <div class="paper-wrap"></div>

        </div>

      </div>

    </main>

  </div>

  <!-- FINAL CARD -->
  <div class="final-card hidden" id="finalCard">

    <div class="card-content">

      <h2>💐 Your Wrapped Bouquet</h2>

      <div class="final-bouquet" id="finalBouquet"></div>

      <div class="final-message" id="finalMessage"></div>

      <button id="createAgain">
        Create Another Bouquet
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
